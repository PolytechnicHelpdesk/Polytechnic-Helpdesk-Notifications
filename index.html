<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Polytechnic Helpdesk | Notification Portal</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header class="header">

        <div class="header-content">

            <img src="images/logo.png"
                 class="logo"
                 alt="Polytechnic Helpdesk">

            <h1>POLYTECHNIC HELPDESK</h1>

            <p>Notification Portal</p>

        </div>

    </header>


    <!-- ================= MAIN ================= -->

    <main class="container">


        <!-- ============== SEARCH PANEL ============== -->

        <section class="filters">

            <!-- Search -->

            <div class="filter-item">

                <label for="searchInput">

                    Search Notification

                </label>

                <input

                    type="text"

                    id="searchInput"

                    placeholder="Enter keyword..."

                >

            </div>


            <!-- Category -->

            <div class="filter-item">

                <label for="categoryFilter">

                    Category

                </label>

                <select id="categoryFilter">

                    <!-- Loaded Automatically -->

                </select>

            </div>


            <!-- Year -->

            <div class="filter-item">

                <label for="yearFilter">

                    Year

                </label>

                <select id="yearFilter">

                    <!-- Loaded Automatically -->

                </select>

            </div>


            <!-- Search Button -->

            <div class="search-button">

                <button id="searchButton">

                    🔍 Search

                </button>

            </div>

        </section>



        <!-- ============== NOTIFICATION TABLE ============== -->

        <section class="table-section">

            <div class="table-title">

                <h2>

                    Latest Notifications

                </h2>

            </div>



            <div class="table-responsive">

                <table>

                    <thead>

                        <tr>

                            <th style="width:12%;">

                                Date

                            </th>

                            <th style="width:15%;">

                                Category

                            </th>

                            <th>

                                Notification

                            </th>

                            <th style="width:10%;">

                                Status

                            </th>

                            <th style="width:18%;">

                                Action

                            </th>

                        </tr>

                    </thead>



                    <tbody id="notificationBody">

                        <!-- Loaded Automatically -->

                    </tbody>

                </table>

            </div>



            <div class="footer">

                <div id="count">

                    Showing 0 to 0 of 0 notifications

                </div>

                <div id="pagination">

                </div>

            </div>

        </section>


    </main>


    <!-- ================= FOOTER ================= -->

    <footer class="site-footer">

        © 2026 Polytechnic Helpdesk. All Rights Reserved.

    </footer>


    <!-- ================= SCRIPT ================= -->

    <script src="script.js"></script>

</body>

</html>
