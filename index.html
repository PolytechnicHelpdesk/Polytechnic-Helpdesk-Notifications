<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Polytechnic Helpdesk | Notification Portal

</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<!-- ================= HEADER ================= -->

<header class="header">

<div class="header-content">

<img
src="images/logo.png"
class="logo"
alt="Polytechnic Helpdesk Logo">

<h1>

POLYTECHNIC HELPDESK

</h1>

<p>

Notification Portal

</p>

</div>

</header>

<!-- ================= TOP BAR ================= -->

<div class="top-bar">

<button id="themeToggle">

🌙 Dark Mode

</button>

</div>

<!-- ================= MAIN ================= -->

<main class="container">

<!-- ================= SEARCH PANEL ================= -->

<section class="filters">

<div class="filter-item">

<label>

Search Notification

</label>

<div class="search-box">

<input

type="text"

id="searchInput"

placeholder="Search notification..."

autocomplete="off"

>

<div id="suggestions"></div>

</div>

</div>

<div class="filter-item">

<label>

Category

</label>

<select id="categoryFilter">

</select>

</div>

<div class="filter-item">

<label>

Year

</label>

<select id="yearFilter">

</select>

</div>

<div class="search-button">

<button onclick="resetFilters()">

Reset

</button>

</div>

</section>

<!-- ================= TABLE ================= -->

<section class="table-section">

<div class="table-title">

<h2>

Latest Notifications

</h2>

</div>

<div class="table-responsive">

<table>

<thead>

<tr>

<th width="12%">

Date

</th>

<th width="15%">

Category

</th>

<th>

Notification

</th>

<th width="10%">

Status

</th>

<th width="18%">

Action

</th>

</tr>

</thead>

<tbody id="notificationBody">

</tbody>

</table>

</div>

<div class="footer">

<div id="count">

Showing 0 to 0 of 0 notifications

</div>

<div id="pagination">

</div>

</div>

</section>

</main>

<!-- ================= FOOTER ================= -->

<footer class="site-footer">

© 2026 Polytechnic Helpdesk. All Rights Reserved.

</footer>

<script src="script.js"></script>

</body>

</html>
